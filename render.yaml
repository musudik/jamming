# Render blueprint — deploys the backend API + a managed Postgres.
# Render dashboard → New → Blueprint → pick this repo. (The frontend goes on Vercel.)
databases:
  - name: jamlyrics-db
    databaseName: jamlyrics
    user: jamlyrics
    plan: free

services:
  - type: web
    name: jamlyrics-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: jamlyrics-db
          property: connectionString
      - key: PORT
        value: "4000"
      - key: JWT_SECRET
        generateValue: true # Render generates a strong secret
      - key: JWT_EXPIRES_IN
        value: "7d"
      - key: SEED_ADMIN_EMAIL
        value: admin@jamlyrics.local
      - key: SEED_ADMIN_PASSWORD
        sync: false # set your own admin password in the dashboard
      - key: CORS_ORIGIN
        sync: false # set to your Vercel URL after the frontend deploys, e.g. https://jamlyrics.vercel.app
