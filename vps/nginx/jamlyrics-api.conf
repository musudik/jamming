# JamLyrics API — reverse proxy on the host's existing nginx.
#
# The backend container publishes to 127.0.0.1:4000; this vhost fronts it with HTTPS.
#
# Install on the VPS:
#   sudo cp vps/nginx/jamlyrics-api.conf /etc/nginx/sites-available/jamlyrics-api.conf
#   sudo ln -s /etc/nginx/sites-available/jamlyrics-api.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d api.207-180-235-87.sslip.io   # adds the TLS config automatically
#
# (If your nginx uses conf.d instead of sites-available, drop it in /etc/nginx/conf.d/.)

server {
    listen 80;
    server_name api.207-180-235-87.sslip.io;

    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
