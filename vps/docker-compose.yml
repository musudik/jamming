# Postgres + pgAdmin for hosting the JamLyrics database on a VPS.
# Usage on the VPS:
#   cp .env.example .env   # then edit credentials
#   docker compose up -d
#
# The remote app then uses:
#   DATABASE_URL="postgresql://<USER>:<PASSWORD>@<VPS_HOST>:<POSTGRES_PORT>/<DB>?schema=<SCHEMA>"
name: jamlyrics-vps

services:
  postgres:
    image: postgres:16-alpine
    container_name: jamlyrics-postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_SCHEMA: ${POSTGRES_SCHEMA} # consumed by the init script below
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro # runs once, on first init
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: jamlyrics-pgadmin
    restart: unless-stopped
    env_file: .env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: "True"
      # Pre-registers the Postgres server in pgAdmin (password still entered on connect).
      PGADMIN_SERVER_JSON_FILE: /pgadmin4/servers.json
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
    depends_on:
      postgres:
        condition: service_healthy

  # The JamLyrics API (Express). Connects to the local postgres service.
  # On boot it runs prisma migrate deploy + seed, then serves on :4000 (internal).
  backend:
    build:
      context: ../backend
    container_name: jamlyrics-backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=${POSTGRES_SCHEMA}"
      PORT: "4000"
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: "7d"
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD}
      CORS_ORIGIN: ${FRONTEND_ORIGIN}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      # Bound to localhost only: the host's existing nginx reverse-proxies to it
      # and terminates HTTPS. Not reachable from the public internet directly.
      - "127.0.0.1:4000:4000"

volumes:
  pgdata:
  pgadmin:
